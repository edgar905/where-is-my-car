  <style>
    /* ── All system fonts — zero network requests, works 100% offline ── */
    :root {
      --font-display: 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
      --font-body:    'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
      --font-mono:    'SF Mono', 'Courier New', monospace;

      --p1: #00d4ff;
      --p2: #00e676;
      --p3: #ff9800;
      --p4: #e040fb;
      --bg: #0a0a0f;
      --surface: #13131c;
      --border: rgba(255,255,255,0.07);
      --text: #f0f0f8;
      --muted: rgba(240,240,248,0.4);
      --active-color: #00d4ff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      width: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100dvh;
      padding: max(env(safe-area-inset-top), 14px) 16px max(env(safe-area-inset-bottom), 12px);
    }

    /* ── Header ── */
    .header {
      width: 100%;
      max-width: 420px;
      text-align: center;
      margin-bottom: 10px;
    }

    .app-title {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 1.75rem;
      letter-spacing: -0.01em;
      color: var(--text);
      line-height: 1.1;
    }

    .app-title span {
      color: var(--active-color);
      transition: color 0.4s ease;
    }

    .location-tag {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-top: 3px;
      text-transform: uppercase;
    }

    /* ── Display card ── */
    .level-display {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 14px 20px 12px;
      text-align: center;
      margin-bottom: 10px;
      position: relative;
      overflow: hidden;
    }

    .level-display::before {
      content: '';
      position: absolute;
      top: -50px; left: 50%;
      transform: translateX(-50%);
      width: 180px; height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--active-color) 0%, transparent 70%);
      opacity: 0.09;
      pointer-events: none;
      transition: background 0.4s ease;
    }

    .saved-badge {
      position: absolute;
      top: 10px; right: 12px;
      font-family: var(--font-mono);
      font-size: 0.52rem;
      letter-spacing: 0.08em;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 3px 9px;
      color: var(--muted);
      text-transform: uppercase;
      font-weight: 600;
    }

    .saved-badge.has-save {
      background: rgba(0,230,118,0.1);
      border-color: rgba(0,230,118,0.3);
      color: #00e676;
    }

    .summary-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      position: relative; z-index: 1;
    }

    .level-number {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 5.5rem;
      line-height: 1;
      color: var(--active-color);
      transition: color 0.3s ease;
      letter-spacing: -0.02em;
    }

    .side-pill {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .side-arrow {
      font-size: 2rem;
      line-height: 1;
      color: var(--active-color);
      transition: color 0.3s ease;
    }

    .side-word {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      color: var(--active-color);
      transition: color 0.3s ease;
      text-transform: uppercase;
    }

    .no-car {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 1.5rem;
      color: var(--muted);
      letter-spacing: -0.01em;
      margin: 8px 0 6px;
      position: relative; z-index: 1;
    }

    .display-sub {
      font-size: 0.58rem;
      letter-spacing: 0.14em;
      color: var(--muted);
      text-transform: uppercase;
      font-weight: 600;
      margin-top: 2px;
      position: relative; z-index: 1;
    }

    /* ── Section labels ── */
    .section-label {
      width: 100%;
      max-width: 420px;
      font-family: var(--font-mono);
      font-size: 0.58rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 6px;
      font-weight: 600;
    }

    /* ── Level grid ── */
    .level-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      width: 100%;
      max-width: 420px;
      margin-bottom: 10px;
    }

    .level-btn {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 14px;
      padding: 12px 0 10px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      transition: all 0.18s ease;
      position: relative;
      overflow: hidden;
    }

    .level-btn::after {
      content: '';
      position: absolute; inset: 0;
      background: var(--btn-color);
      opacity: 0;
      transition: opacity 0.18s ease;
      border-radius: inherit;
    }

    .level-btn:active { transform: scale(0.93); }
    .level-btn[data-level="P1"] { --btn-color: var(--p1); }
    .level-btn[data-level="P2"] { --btn-color: var(--p2); }
    .level-btn[data-level="P3"] { --btn-color: var(--p3); }
    .level-btn[data-level="P4"] { --btn-color: var(--p4); }

    .level-btn.active {
      border-color: var(--btn-color);
      background: color-mix(in srgb, var(--btn-color) 12%, var(--surface));
    }
    .level-btn.active::after { opacity: 0.06; }

    .btn-level-text {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 1.6rem;
      line-height: 1;
      color: var(--btn-color);
      position: relative; z-index: 1;
      letter-spacing: -0.01em;
    }

    .btn-label {
      font-size: 0.52rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      font-weight: 600;
      position: relative; z-index: 1;
    }

    .level-btn.active .btn-label { color: var(--btn-color); }

    /* ── Side grid ── */
    .side-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      width: 100%;
      max-width: 420px;
      margin-bottom: 10px;
    }

    .side-btn {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 14px;
      padding: 12px 0 10px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      transition: all 0.18s ease;
      position: relative;
      overflow: hidden;
    }

    .side-btn::after {
      content: '';
      position: absolute; inset: 0;
      background: var(--active-color);
      opacity: 0;
      transition: opacity 0.18s ease;
      border-radius: inherit;
    }

    .side-btn:active { transform: scale(0.94); }

    .side-btn.active {
      border-color: var(--active-color);
      background: color-mix(in srgb, var(--active-color) 12%, var(--surface));
    }
    .side-btn.active::after { opacity: 0.06; }

    .side-btn-icon {
      font-size: 1.5rem;
      line-height: 1;
      color: var(--active-color);
      position: relative; z-index: 1;
    }

    .side-btn-text {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 1rem;
      letter-spacing: 0.06em;
      color: var(--active-color);
      position: relative; z-index: 1;
    }

    .side-btn-sub {
      font-size: 0.52rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      font-weight: 600;
      position: relative; z-index: 1;
    }

    .side-btn.active .side-btn-sub { color: var(--active-color); }

    /* ── Actions ── */
    .actions {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn-save {
      width: 100%;
      padding: 15px;
      border-radius: 16px;
      border: none;
      background: var(--active-color);
      color: #000;
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: all 0.18s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-save:active { transform: scale(0.97); opacity: 0.85; }

    .btn-save:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      background: rgba(240,240,248,0.15) !important;
      color: var(--muted);
    }

    .btn-clear {
      width: 100%;
      padding: 11px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.18s ease;
    }

    .btn-clear:active { opacity: 0.6; transform: scale(0.97); }

    /* ── Saved time ── */
    .saved-time {
      width: 100%;
      max-width: 420px;
      text-align: center;
      margin-top: 6px;
      font-family: var(--font-mono);
      font-size: 0.58rem;
      letter-spacing: 0.07em;
      color: var(--muted);
      text-transform: uppercase;
      min-height: 16px;
    }

    /* ── Footer ── */
    .footer {
      width: 100%;
      max-width: 420px;
      margin-top: auto;
      padding-top: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .install-tip p {
      font-size: 0.63rem;
      color: var(--muted);
      letter-spacing: 0.03em;
      line-height: 1.6;
      text-align: center;
    }

    .install-tip strong { color: rgba(240,240,248,0.6); }

    .ogl-brand {
      width: 100%;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }

    .ogl-built-by {
      font-family: var(--font-mono);
      font-size: 0.52rem;
      letter-spacing: 0.1em;
      color: rgba(240,240,248,0.2);
      text-transform: uppercase;
    }

    .ogl-divider {
      width: 3px; height: 3px;
      border-radius: 50%;
      background: rgba(240,240,248,0.15);
    }

    .ogl-name {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 0.82rem;
      letter-spacing: 0.1em;
      color: #c9a84c;
      text-decoration: none;
      text-transform: uppercase;
    }

    /* ── Offline banner ── */
    .offline-bar {
      display: none;
      width: 100%;
      max-width: 420px;
      background: rgba(255,152,0,0.12);
      border: 1px solid rgba(255,152,0,0.3);
      border-radius: 10px;
      padding: 7px 12px;
      font-size: 0.62rem;
      color: #ff9800;
      text-align: center;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    @keyframes bump {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
    .bump { animation: bump 0.25s ease; }

    .toast {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 24px);
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: rgba(20,20,30,0.96);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 40px;
      padding: 11px 20px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      opacity: 0;
      transition: all 0.3s ease;
      white-space: nowrap;
      pointer-events: none;
      z-index: 999;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

  <div class="offline-bar" id="offlineBar">📵 Offline — all data saved locally on your phone</div>

  <div class="header">
    <div class="app-title">WHERE IS <span id="titleAccent">MY CAR</span></div>
    <div class="location-tag">📍 701 W Beech St · San Diego, CA</div>
  </div>

  <div class="level-display">
    <div class="saved-badge" id="savedBadge">NOT SAVED</div>
    <div class="summary-row" id="summaryRow" style="display:none">
      <span class="level-number" id="levelNumber"></span>
      <div class="side-pill">
        <span class="side-arrow" id="sideArrow"></span>
        <span class="side-word" id="sideWord"></span>
      </div>
    </div>
    <div class="no-car" id="noCar">SELECT LEVEL &amp; SIDE</div>
    <div class="display-sub" id="displaySub" style="display:none">PARKING LEVEL · GARAGE SIDE</div>
  </div>

  <div class="section-label">Parking Level</div>
  <div class="level-grid">
    <button class="level-btn" data-level="P1" onclick="selectLevel('P1')">
      <span class="btn-level-text">P1</span>
      <span class="btn-label">Level 1</span>
    </button>
    <button class="level-btn" data-level="P2" onclick="selectLevel('P2')">
      <span class="btn-level-text">P2</span>
      <span class="btn-label">Level 2</span>
    </button>
    <button class="level-btn" data-level="P3" onclick="selectLevel('P3')">
      <span class="btn-level-text">P3</span>
      <span class="btn-label">Level 3</span>
    </button>
    <button class="level-btn" data-level="P4" onclick="selectLevel('P4')">
      <span class="btn-level-text">P4</span>
      <span class="btn-label">Level 4</span>
    </button>
  </div>

  <div class="section-label">Garage Side</div>
  <div class="side-grid">
    <button class="side-btn" data-side="Left" onclick="selectSide('Left')">
      <span class="side-btn-icon">←</span>
      <span class="side-btn-text">LEFT</span>
      <span class="side-btn-sub">Side</span>
    </button>
    <button class="side-btn" data-side="Right" onclick="selectSide('Right')">
      <span class="side-btn-icon">→</span>
      <span class="side-btn-text">RIGHT</span>
      <span class="side-btn-sub">Side</span>
    </button>
  </div>

  <div class="actions">
    <button class="btn-save" id="btnSave" onclick="saveCar()" disabled>
      🚗 &nbsp;I PARKED HERE
    </button>
    <button class="btn-clear" id="btnClear" onclick="clearCar()" style="display:none">
      ✓ Found my car — clear it
    </button>
  </div>

  <div class="saved-time" id="savedTime"></div>

  <div class="footer">
    <div class="install-tip">
      <p>📱 <strong>Add to Home Screen:</strong> Tap <strong>Share ↑</strong> → <strong>"Add to Home Screen"</strong></p>
    </div>
    <div class="ogl-brand">
      <span class="ogl-built-by">Built by</span>
      <div class="ogl-divider"></div>
      <a class="ogl-name" href="https://onegiantleap.ai" target="_blank">ONE GIANT LEAP AI</a>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ── Offline detection ──
    function updateOnlineStatus() {
      document.getElementById('offlineBar').style.display = navigator.onLine ? 'none' : 'block';
    }
    window.addEventListener('online', updateOnlineStatus);
    window.addEventListener('offline', updateOnlineStatus);
    updateOnlineStatus();

    // ── App logic ──
    const COLORS = { P1:'#00d4ff', P2:'#00e676', P3:'#ff9800', P4:'#e040fb' };
    let selectedLevel = null;
    let selectedSide = null;

    window.addEventListener('DOMContentLoaded', () => {
      const saved = getSaved();
      if (saved) {
        selectedLevel = saved.level;
        selectedSide = saved.side;
        setRootColor(COLORS[saved.level]);
        highlightLevelBtn(saved.level);
        highlightSideBtn(saved.side);
        updateDisplay(false);
        updateSavedBadge(true);
        updateSavedTime(saved.timestamp);
        document.getElementById('btnClear').style.display = 'block';
        document.getElementById('btnSave').disabled = false;
        document.getElementById('btnSave').style.background = COLORS[saved.level];
      }
    });

    function getSaved() {
      try { return JSON.parse(localStorage.getItem('wimc_saved')); }
      catch { return null; }
    }

    function selectLevel(level) {
      selectedLevel = level;
      setRootColor(COLORS[level]);
      highlightLevelBtn(level);
      updateDisplay(true);
      checkReady();
    }

    function selectSide(side) {
      selectedSide = side;
      highlightSideBtn(side);
      updateDisplay(false);
      checkReady();
    }

    function highlightLevelBtn(level) {
      document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
      document.querySelector(`.level-btn[data-level="${level}"]`)?.classList.add('active');
    }

    function highlightSideBtn(side) {
      document.querySelectorAll('.side-btn').forEach(b => b.classList.remove('active'));
      document.querySelector(`.side-btn[data-side="${side}"]`)?.classList.add('active');
    }

    function setRootColor(hex) {
      document.documentElement.style.setProperty('--active-color', hex);
      const btn = document.getElementById('btnSave');
      if (!btn.disabled) btn.style.background = hex;
    }

    function updateDisplay(animateLevel) {
      const hasLevel = !!selectedLevel;
      const hasSide  = !!selectedSide;
      const noCarEl   = document.getElementById('noCar');
      const summaryRow = document.getElementById('summaryRow');
      const subEl     = document.getElementById('displaySub');
      const numEl     = document.getElementById('levelNumber');
      const arrowEl   = document.getElementById('sideArrow');
      const wordEl    = document.getElementById('sideWord');

      if (hasLevel || hasSide) {
        noCarEl.style.display = 'none';
        summaryRow.style.display = 'flex';
        subEl.style.display = 'block';
        numEl.textContent = hasLevel ? selectedLevel : '??';
        numEl.style.color = hasLevel ? COLORS[selectedLevel] : 'var(--muted)';
        if (hasSide) {
          arrowEl.textContent = selectedSide === 'Left' ? '←' : '→';
          arrowEl.style.color = 'var(--active-color)';
          wordEl.textContent  = selectedSide.toUpperCase();
          wordEl.style.color  = 'var(--active-color)';
        } else {
          arrowEl.textContent = '?';
          arrowEl.style.color = 'var(--muted)';
          wordEl.textContent  = 'SIDE';
          wordEl.style.color  = 'var(--muted)';
        }
        if (animateLevel && hasLevel) {
          numEl.classList.remove('bump');
          void numEl.offsetWidth;
          numEl.classList.add('bump');
        }
      } else {
        noCarEl.style.display = 'block';
        summaryRow.style.display = 'none';
        subEl.style.display = 'none';
      }
    }

    function checkReady() {
      const ready = !!(selectedLevel && selectedSide);
      const btn = document.getElementById('btnSave');
      btn.disabled = !ready;
      if (ready) btn.style.background = COLORS[selectedLevel];
    }

    function saveCar() {
      if (!selectedLevel || !selectedSide) return;
      const data = { level: selectedLevel, side: selectedSide, timestamp: Date.now() };
      localStorage.setItem('wimc_saved', JSON.stringify(data));
      updateSavedBadge(true);
      updateSavedTime(data.timestamp);
      document.getElementById('btnClear').style.display = 'block';
      showToast(`✅ Saved! ${selectedLevel} · ${selectedSide} Side`);
    }

    function clearCar() {
      localStorage.removeItem('wimc_saved');
      selectedLevel = null;
      selectedSide  = null;
      document.querySelectorAll('.level-btn, .side-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('summaryRow').style.display = 'none';
      document.getElementById('noCar').style.display = 'block';
      document.getElementById('displaySub').style.display = 'none';
      document.getElementById('savedBadge').textContent = 'NOT SAVED';
      document.getElementById('savedBadge').classList.remove('has-save');
      document.getElementById('savedTime').textContent = '';
      document.getElementById('btnClear').style.display = 'none';
      const saveBtn = document.getElementById('btnSave');
      saveBtn.disabled = true;
      saveBtn.style.background = '';
      document.documentElement.style.setProperty('--active-color', '#00d4ff');
      showToast('🗑 Cleared — go find your car!');
    }

    function updateSavedBadge(saved) {
      const badge = document.getElementById('savedBadge');
      badge.textContent = saved ? 'SAVED ✓' : 'NOT SAVED';
      badge.classList.toggle('has-save', saved);
    }

    function updateSavedTime(ts) {
      const el = document.getElementById('savedTime');
      if (!ts) { el.textContent = ''; return; }
      const d = new Date(ts);
      const diffMs    = Date.now() - ts;
      const diffMins  = Math.floor(diffMs / 60000);
      const diffHours = Math.floor(diffMs / 3600000);
      const diffDays  = Math.floor(diffMs / 86400000);
      const ago = diffMins  < 1  ? 'just now'
                : diffMins  < 60 ? `${diffMins}m ago`
                : diffHours < 24 ? `${diffHours}h ago`
                : `${diffDays}d ago`;
      const dateStr = d.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'});
      const timeStr = d.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'});
      el.textContent = `Parked ${dateStr} at ${timeStr} · ${ago}`;
    }

    setInterval(() => { const s = getSaved(); if (s) updateSavedTime(s.timestamp); }, 60000);

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2800);
    }
  </script>
</body>
</html>
